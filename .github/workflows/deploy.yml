name: Deploy Hexo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Hexo site
        run: npm run build

      - name: Publish public folder to huiink.github.io
        if: env.PAGES_DEPLOY_TOKEN != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: huiink/huiink.github.io
          publish_branch: main
          publish_dir: ./public
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: Deploy Hexo site from ${{ github.sha }}

      - name: Skip publish when deploy token is missing
        if: env.PAGES_DEPLOY_TOKEN == ''
        run: |
          echo "::warning::PAGES_DEPLOY_TOKEN is not set. Build succeeded, but the site was not published to huiink/huiink.github.io."
