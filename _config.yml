title: huiink's blog
subtitle:
description:
keywords:
author: 老祖
language: zh-TW
timezone: Asia/Taipei

url: https://huiink.github.io
permalink: :year/:month/:day/:title/
pretty_urls:
  trailing_index: true
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
include:
  - .nojekyll

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude:
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true

syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

index_generator:
  path: ''
  per_page: 10
  order_by: -date
archive_generator:
  per_page: 0
category_generator:
  per_page: 10
tag_generator:
  per_page: 10

theme: vivia

deploy:
  type: git
  repo: https://github.com/huiink/huiink.github.io.git
  branch: main

feed:
  type: atom
  path: atom.xml
  limit: 20
  content: true

symbols_count_time:
  symbols: true
  time: false
  total_symbols: false
  total_time: false
